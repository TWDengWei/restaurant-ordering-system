<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單管理 - 餐飲管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print {
      body > * { display: none !important; }
      #print-area { display: block !important; }
    }
    #print-area { display: none; }
    #sidebar { transition: transform 0.3s ease, width 0.3s ease; transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #main-content { transition: margin-left 0.3s ease; }
    @media (max-width: 767px) {
      #main-content { margin-left: 0 !important; padding-top: 3.5rem; }
    }
    @media (min-width: 768px) {
      #sidebar { transform: translateX(0); }
      #sidebar.collapsed { width: 3.5rem; }
      #sidebar.collapsed .nav-label { display: none; }
      #sidebar.collapsed .nav-link { justify-content: center; padding-left: 0; padding-right: 0; }
      #main-content.collapsed-main { margin-left: 3.5rem !important; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <!-- Mobile Top Bar -->
  <div class="md:hidden fixed top-0 left-0 right-0 h-14 bg-gray-900 text-white flex items-center px-4 z-40 shadow-lg">
    <button onclick="toggleSidebar()" class="mr-3 p-1.5 rounded-lg hover:bg-gray-700 focus:outline-none">
      <div class="space-y-1.5">
        <div class="w-5 h-0.5 bg-white rounded"></div>
        <div class="w-5 h-0.5 bg-white rounded"></div>
        <div class="w-5 h-0.5 bg-white rounded"></div>
      </div>
    </button>
    <span class="text-lg font-bold">🍽️ 餐飲管理</span>
  </div>

  <!-- Sidebar Overlay (mobile) -->
  <div id="sidebar-overlay" onclick="closeSidebar()" class="hidden fixed inset-0 bg-black/50 z-20 md:hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="w-56 bg-gray-900 text-white flex flex-col min-h-screen fixed left-0 top-0 z-30">
    <div class="p-5 border-b border-gray-700">
      <div class="flex items-center gap-2">
        <span class="text-xl">🍽️</span>
        <span class="font-bold nav-label">餐飲管理</span>
      </div>
      <div class="text-xs text-gray-400 mt-1 nav-label" id="admin-name"></div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="dashboard.html" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition"><span>📊</span><span class="nav-label">儀表板</span></a>
      <a href="orders.html"    class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg bg-orange-600 text-white text-sm font-medium"><span>📋</span><span class="nav-label">訂單管理</span></a>
      <a href="menu.html"      class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition"><span>🍜</span><span class="nav-label">菜單管理</span></a>
      <a href="reports.html"   class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition"><span>📈</span><span class="nav-label">報表</span></a>
      <a href="qrcodes.html"   class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition"><span>🔲</span><span class="nav-label">QR碼管理</span></a>
    </nav>
    <div class="p-3 space-y-1">
      <button onclick="toggleCollapse()" id="collapse-btn" class="hidden md:flex w-full px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-400 text-sm items-center gap-2 transition">
        <span id="collapse-icon">◀</span><span class="nav-label">收縮選單</span>
      </button>
      <button onclick="logout()" class="nav-link w-full px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-400 text-sm text-left flex items-center gap-2 transition">
        <span>🚪</span><span class="nav-label">登出</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main-content" class="ml-56 flex-1 p-4 md:p-6">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800">訂單管理</h1>
      <div class="flex items-center gap-2 text-sm text-gray-500">
        自動更新中
        <span class="w-2 h-2 rounded-full bg-green-400 inline-block animate-pulse"></span>
      </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-5 flex flex-wrap gap-3 items-end">
      <div>
        <label class="text-xs text-gray-500 block mb-1">狀態篩選</label>
        <select id="filter-status" onchange="loadOrders()"
          class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
          <option value="">全部</option>
          <option value="Pending">待確認</option>
          <option value="Confirmed">進行中</option>
          <option value="Unpaid">未結帳</option>
          <option value="Paid">已結帳</option>
          <option value="Cancelled">已取消</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-500 block mb-1">日期</label>
        <input type="date" id="filter-date" onchange="loadOrders()"
          class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
      </div>
      <button onclick="loadOrders()"
        class="bg-orange-500 hover:bg-orange-600 text-white text-sm px-4 py-1.5 rounded-lg transition">
        重新整理
      </button>
    </div>

    <!-- Orders Grid -->
    <div id="orders-container" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
      <div class="col-span-full text-center text-gray-400 py-12">載入中...</div>
    </div>
  </main>

  <!-- Print Area -->
  <div id="print-area" class="p-6 max-w-xs mx-auto font-mono text-sm">
    <div class="text-center border-b pb-3 mb-3">
      <div class="text-lg font-bold">餐廳收據</div>
      <div id="p-time"></div>
    </div>
    <div id="p-table" class="mb-2 font-bold"></div>
    <div id="p-order-id" class="mb-3 text-gray-600"></div>
    <div id="p-items" class="border-t pt-2 mb-2 space-y-1"></div>
    <div class="border-t pt-2">
      <div class="flex justify-between font-bold text-base">
        <span>合計</span>
        <span id="p-total"></span>
      </div>
    </div>
    <div class="text-center text-xs text-gray-500 mt-4 border-t pt-3">
      付款方式：現金<br>謝謝您的光臨！
    </div>
  </div>

  <script>
    const API = '';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/admin/index.html';
    document.getElementById('admin-name').textContent = localStorage.getItem('username') || '';

    document.getElementById('filter-date').value = new Date().toLocaleDateString('en-CA');

    const statusColors = {
      Pending:   'border-l-4 border-yellow-400',
      Confirmed: 'border-l-4 border-blue-400',
      Unpaid:    'border-l-4 border-purple-400',
      Paid:      'border-l-4 border-green-400',
      Cancelled: 'border-l-4 border-gray-300 opacity-60'
    };
    const badgeColors = {
      Pending:   'bg-yellow-100 text-yellow-700',
      Confirmed: 'bg-blue-100 text-blue-700',
      Unpaid:    'bg-purple-100 text-purple-700',
      Paid:      'bg-green-100 text-green-700',
      Cancelled: 'bg-gray-100 text-gray-500'
    };

    async function loadOrders() {
      const status = document.getElementById('filter-status').value;
      const date   = document.getElementById('filter-date').value;
      let url = `${API}/api/orders?`;
      if (status) url += `status=${status}&`;
      if (date)   url += `date=${date}`;

      try {
        const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
        if (res.status === 401) { logout(); return; }
        const orders = await res.json();
        renderOrders(orders);
      } catch (e) { console.error(e); }
    }

    function renderOrders(orders) {
      const c = document.getElementById('orders-container');
      if (!orders.length) {
        c.innerHTML = '<div class="col-span-full text-center text-gray-400 py-12">此條件下沒有訂單</div>';
        return;
      }
      c.innerHTML = orders.map(o => `
        <div class="bg-white rounded-xl shadow-sm overflow-hidden ${statusColors[o.status] || ''}">
          <div class="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-gray-50 transition"
            onclick="toggleDetail('ord-${o.id}')">
            <div class="flex items-center gap-2 min-w-0">
              <span class="font-bold text-gray-800 flex-shrink-0">#${o.id}</span>
              <span class="font-medium text-gray-700 flex-shrink-0">${o.tableName}</span>
              <span class="text-xs text-gray-400 hidden sm:inline truncate">${new Date(o.createdAt).toLocaleString('zh-TW')}</span>
            </div>
            <div class="flex items-center gap-1.5 flex-shrink-0">
              <span class="font-bold text-gray-800 text-sm">NT$ ${o.totalAmount}</span>
              <span class="text-xs px-2 py-0.5 rounded-full font-medium ${badgeColors[o.status] || ''}">${o.statusLabel}</span>
              <span id="icon-ord-${o.id}" class="text-gray-400 text-xs">▼</span>
            </div>
          </div>
          <div id="detail-ord-${o.id}" class="hidden border-t border-gray-100 px-4 py-3 bg-gray-50">
            <div class="space-y-1 mb-3">
              ${(o.items || []).map(i => `
                <div class="flex justify-between text-sm">
                  <span class="text-gray-700">${i.itemName} <span class="text-gray-400">× ${i.quantity}</span></span>
                  <span class="text-gray-600">NT$ ${i.subtotal}</span>
                </div>
                ${i.note ? `<div class="text-xs text-orange-500 pl-2">備註：${i.note}</div>` : ''}
              `).join('')}
              <div class="flex justify-between font-bold text-sm border-t border-gray-200 pt-1 mt-1">
                <span class="text-gray-700">合計</span>
                <span class="text-gray-800">NT$ ${o.totalAmount}</span>
              </div>
              ${o.note ? `<div class="text-xs text-blue-500 mt-1">訂單備註：${o.note}</div>` : ''}
            </div>
            <div class="flex flex-wrap gap-2">
              ${o.status === 'Pending' ? `
                <button onclick="confirmOrder(${o.id})" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white text-xs py-1.5 rounded-lg transition">確認訂單</button>
              ` : ''}
              ${o.status === 'Confirmed' ? `
                <button onclick="setDining(${o.id})" class="flex-1 bg-purple-500 hover:bg-purple-600 text-white text-xs py-1.5 rounded-lg transition">標記用餐中</button>
                <button onclick="payOrder(${o.id})" class="flex-1 bg-green-500 hover:bg-green-600 text-white text-xs py-1.5 rounded-lg transition">結帳</button>
              ` : ''}
              ${o.status === 'Unpaid' ? `
                <button onclick="payOrder(${o.id})" class="flex-1 bg-green-500 hover:bg-green-600 text-white text-xs py-1.5 rounded-lg transition">結帳</button>
              ` : ''}
              ${['Pending','Confirmed','Unpaid'].includes(o.status) ? `
                <button onclick="cancelOrder(${o.id})" class="bg-red-100 hover:bg-red-200 text-red-600 text-xs py-1.5 px-3 rounded-lg transition">取消</button>
              ` : ''}
              <button onclick="printOrder(${o.id})" class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs py-1.5 px-3 rounded-lg transition">列印</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function toggleDetail(key) {
      const el   = document.getElementById(`detail-${key}`);
      const icon = document.getElementById(`icon-${key}`);
      if (!el) return;
      const hidden = el.classList.toggle('hidden');
      icon.textContent = hidden ? '▼' : '▲';
    }

    async function confirmOrder(id) { await doAction(`${API}/api/orders/${id}/confirm`, 'PUT'); }
    async function setDining(id)    { await doAction(`${API}/api/orders/${id}/dining`, 'PUT'); }
    async function payOrder(id) {
      if (!confirm('確認結帳？')) return;
      await doAction(`${API}/api/orders/${id}/pay`, 'PUT');
    }
    async function cancelOrder(id) {
      if (!confirm('確定取消此訂單？')) return;
      await doAction(`${API}/api/orders/${id}/cancel`, 'PUT');
    }

    async function doAction(url, method) {
      try {
        const res = await fetch(url, { method, headers: { Authorization: `Bearer ${token}` } });
        if (res.status === 401) { logout(); return; }
        if (!res.ok) {
          let msg = '操作失敗';
          try { const d = await res.json(); msg = d.message || msg; } catch (_) {}
          alert(msg);
          return;
        }
        loadOrders();
      } catch (e) {
        alert('網路錯誤，請重試');
      }
    }

    async function printOrder(id) {
      const detail = document.getElementById(`detail-ord-${id}`);
      if (detail) detail.classList.remove('hidden');
      const res = await fetch(`${API}/api/orders/${id}`, { headers: { Authorization: `Bearer ${token}` } });
      const o = await res.json();

      document.getElementById('p-time').textContent = new Date(o.createdAt).toLocaleString('zh-TW');
      document.getElementById('p-table').textContent = o.tableName;
      document.getElementById('p-order-id').textContent = `訂單編號：#${o.id}`;
      document.getElementById('p-items').innerHTML = o.items.map(i =>
        `<div class="flex justify-between">
          <span>${i.itemName} × ${i.quantity}</span>
          <span>NT$ ${i.subtotal}</span>
        </div>${i.note ? `<div class="text-xs text-gray-500 pl-2">備註：${i.note}</div>` : ''}`
      ).join('');
      document.getElementById('p-total').textContent = `NT$ ${o.totalAmount}`;
      window.print();
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/admin/index.html';
    }

    // ── Sidebar RWD ────────────────────────────────
    function toggleSidebar() {
      const isOpen = document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-overlay').classList.toggle('hidden', !isOpen);
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.add('hidden');
    }
    function toggleCollapse() {
      const sidebar = document.getElementById('sidebar');
      const main    = document.getElementById('main-content');
      const icon    = document.getElementById('collapse-icon');
      const col     = sidebar.classList.toggle('collapsed');
      main.classList.toggle('collapsed-main', col);
      if (icon) icon.textContent = col ? '▶' : '◀';
      localStorage.setItem('sidebarCollapsed', col ? '1' : '0');
    }
    (function () {
      if (window.innerWidth >= 768 && localStorage.getItem('sidebarCollapsed') === '1') {
        const s = document.getElementById('sidebar');
        const m = document.getElementById('main-content');
        const i = document.getElementById('collapse-icon');
        if (s) s.classList.add('collapsed');
        if (m) m.classList.add('collapsed-main');
        if (i) i.textContent = '▶';
      }
    })();

    loadOrders();
    setInterval(loadOrders, 15000);
  </script>
</body>
</html>
