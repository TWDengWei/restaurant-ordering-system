<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜單管理 - 餐飲管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-56 bg-gray-900 text-white flex flex-col min-h-screen fixed left-0 top-0 z-30">
    <div class="p-5 border-b border-gray-700">
      <div class="text-xl font-bold">🍽️ 餐飲管理</div>
      <div class="text-xs text-gray-400 mt-1" id="admin-name"></div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition">📊 儀表板</a>
      <a href="orders.html"    class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition">📋 訂單管理</a>
      <a href="menu.html"      class="flex items-center gap-2 px-3 py-2 rounded-lg bg-orange-600 text-white text-sm font-medium">🍜 菜單管理</a>
      <a href="reports.html"   class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition">📈 報表</a>
      <a href="qrcodes.html"   class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition">🔲 QR碼管理</a>
    </nav>
    <div class="p-3">
      <button onclick="logout()" class="w-full px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-400 text-sm text-left transition">登出</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="ml-56 flex-1 p-6">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">菜單管理</h1>

    <div class="flex gap-5">
      <!-- Left: Categories -->
      <div class="w-52 flex-shrink-0">
        <div class="bg-white rounded-xl shadow-sm p-4">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-gray-700 text-sm">分類</h2>
            <button onclick="openCategoryModal()" class="text-orange-500 hover:text-orange-600 text-xs font-medium">+ 新增</button>
          </div>
          <div id="category-list" class="space-y-1">
            <div class="text-gray-400 text-xs">載入中...</div>
          </div>
        </div>
      </div>

      <!-- Right: Menu Items -->
      <div class="flex-1">
        <div class="bg-white rounded-xl shadow-sm p-4">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-semibold text-gray-700" id="category-title">請選擇分類</h2>
            <button onclick="openItemModal()" id="add-item-btn" disabled
              class="bg-orange-500 hover:bg-orange-600 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm px-4 py-1.5 rounded-lg transition">
              + 新增菜品
            </button>
          </div>
          <div id="item-list" class="space-y-3">
            <div class="text-gray-400 text-sm text-center py-8">← 請先選擇左側分類</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Category Modal -->
  <div id="category-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm">
      <h3 class="font-bold text-gray-800 mb-4" id="cat-modal-title">新增分類</h3>
      <div class="space-y-3 mb-4">
        <div>
          <label class="text-sm text-gray-600 block mb-1">分類名稱 *</label>
          <input id="cat-name" type="text" placeholder="例如：主食、飲料"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
        </div>
        <div>
          <label class="text-sm text-gray-600 block mb-1">排序（數字越小越前面）</label>
          <input id="cat-sort" type="number" value="0" min="0"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
        </div>
        <label class="flex items-center gap-2 text-sm text-gray-600">
          <input id="cat-active" type="checkbox" checked class="rounded"> 啟用此分類
        </label>
      </div>
      <div class="flex gap-2">
        <button onclick="saveCategoryModal()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-2 rounded-lg text-sm transition">儲存</button>
        <button onclick="closeCategoryModal()" class="flex-1 border border-gray-200 text-gray-600 py-2 rounded-lg text-sm hover:bg-gray-50 transition">取消</button>
      </div>
    </div>
  </div>

  <!-- Item Modal -->
  <div id="item-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-lg max-h-screen overflow-y-auto">
      <h3 class="font-bold text-gray-800 mb-4" id="item-modal-title">新增菜品</h3>
      <div class="space-y-3 mb-4">
        <div>
          <label class="text-sm text-gray-600 block mb-1">菜品名稱 *</label>
          <input id="item-name" type="text" placeholder="例如：牛肉麵"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
        </div>
        <div>
          <label class="text-sm text-gray-600 block mb-1">售價（NT$）*</label>
          <input id="item-price" type="number" min="0" step="1" placeholder="120"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
        </div>
        <div>
          <label class="text-sm text-gray-600 block mb-1">描述（選填）</label>
          <textarea id="item-desc" rows="2" placeholder="菜品描述..."
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 resize-none"></textarea>
        </div>
        <div>
          <label class="text-sm text-gray-600 block mb-1">排序</label>
          <input id="item-sort" type="number" value="0" min="0"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
        </div>
        <div>
          <label class="text-sm text-gray-600 block mb-1">商品圖片（選填）</label>
          <input id="item-image-file" type="file" accept="image/*" onchange="previewImage(this)"
            class="w-full text-sm text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-sm file:bg-orange-50 file:text-orange-600 hover:file:bg-orange-100">
          <div id="item-image-preview" class="mt-2 hidden">
            <img id="preview-img" src="" alt="預覽" class="h-24 rounded-lg object-cover">
            <button onclick="clearImage()" class="text-xs text-red-500 hover:underline mt-1 block">移除圖片</button>
          </div>
        </div>
        <label class="flex items-center gap-2 text-sm text-gray-600">
          <input id="item-available" type="checkbox" checked class="rounded"> 上架販售
        </label>
      </div>
      <div class="flex gap-2">
        <button onclick="saveItemModal()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-2 rounded-lg text-sm transition">儲存</button>
        <button onclick="closeItemModal()" class="flex-1 border border-gray-200 text-gray-600 py-2 rounded-lg text-sm hover:bg-gray-50 transition">取消</button>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/admin/index.html';
    document.getElementById('admin-name').textContent = localStorage.getItem('username') || '';

    let categories = [];
    let selectedCategoryId = null;
    let editingCategoryId = null;
    let editingItemId = null;
    let currentImageBase64 = null;

    async function loadCategories() {
      const res = await fetch(`${API}/api/categories`, { headers: { Authorization: `Bearer ${token}` } });
      categories = await res.json();
      renderCategories();
    }

    function renderCategories() {
      const el = document.getElementById('category-list');
      if (!categories.length) {
        el.innerHTML = '<div class="text-gray-400 text-xs">尚無分類</div>';
        return;
      }
      el.innerHTML = categories.map(c => `
        <div class="group flex items-center justify-between px-2 py-1.5 rounded-lg cursor-pointer text-sm transition
          ${c.id === selectedCategoryId ? 'bg-orange-50 text-orange-700 font-medium' : 'hover:bg-gray-50 text-gray-700'}"
          onclick="selectCategory(${c.id})">
          <span class="${!c.isActive ? 'opacity-50' : ''}">${c.name} <span class="text-xs text-gray-400">(${c.itemCount})</span></span>
          <div class="hidden group-hover:flex gap-1">
            <button onclick="event.stopPropagation(); editCategory(${c.id})" class="text-blue-400 hover:text-blue-600 text-xs">✏</button>
            <button onclick="event.stopPropagation(); deleteCategory(${c.id})" class="text-red-400 hover:text-red-600 text-xs">✕</button>
          </div>
        </div>
      `).join('');
    }

    async function selectCategory(id) {
      selectedCategoryId = id;
      document.getElementById('add-item-btn').disabled = false;
      const cat = categories.find(c => c.id === id);
      document.getElementById('category-title').textContent = cat?.name || '';
      renderCategories();
      await loadItems();
    }

    async function loadItems() {
      const res = await fetch(`${API}/api/menu?categoryId=${selectedCategoryId}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const items = await res.json();
      renderItems(items);
    }

    function renderItems(items) {
      const el = document.getElementById('item-list');
      if (!items.length) {
        el.innerHTML = '<div class="text-gray-400 text-sm text-center py-8">此分類尚無菜品</div>';
        return;
      }
      el.innerHTML = items.map(m => `
        <div class="flex items-center gap-3 p-3 border border-gray-100 rounded-xl hover:border-gray-200 transition ${!m.isAvailable ? 'opacity-60' : ''}">
          <div class="w-14 h-14 rounded-lg overflow-hidden flex-shrink-0 bg-gray-100 flex items-center justify-center">
            ${m.imageBase64
              ? `<img src="${m.imageBase64}" alt="${m.name}" class="w-full h-full object-cover">`
              : `<span class="text-2xl">🍽️</span>`}
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-medium text-gray-800 truncate">${m.name}</div>
            ${m.description ? `<div class="text-xs text-gray-500 truncate">${m.description}</div>` : ''}
            <div class="text-sm font-semibold text-orange-600 mt-0.5">NT$ ${m.price}</div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <button onclick="toggleItem(${m.id}, ${m.isAvailable})"
              class="text-xs px-2 py-1 rounded-lg ${m.isAvailable ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'} hover:opacity-80 transition">
              ${m.isAvailable ? '上架' : '下架'}
            </button>
            <button onclick="editItem(${m.id})" class="text-xs px-2 py-1 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition">編輯</button>
            <button onclick="deleteItem(${m.id})" class="text-xs px-2 py-1 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 transition">刪除</button>
          </div>
        </div>
      `).join('');
    }

    // ── Category Modal ─────────────────────────────
    function openCategoryModal(id) {
      editingCategoryId = id || null;
      const title = document.getElementById('cat-modal-title');
      if (id) {
        const c = categories.find(x => x.id === id);
        title.textContent = '編輯分類';
        document.getElementById('cat-name').value = c.name;
        document.getElementById('cat-sort').value = c.sortOrder;
        document.getElementById('cat-active').checked = c.isActive;
      } else {
        title.textContent = '新增分類';
        document.getElementById('cat-name').value = '';
        document.getElementById('cat-sort').value = '0';
        document.getElementById('cat-active').checked = true;
      }
      document.getElementById('category-modal').classList.remove('hidden');
    }
    function closeCategoryModal() {
      document.getElementById('category-modal').classList.add('hidden');
    }
    function editCategory(id) { openCategoryModal(id); }

    async function saveCategoryModal() {
      const name = document.getElementById('cat-name').value.trim();
      if (!name) { alert('請輸入分類名稱'); return; }
      const body = {
        name,
        sortOrder: parseInt(document.getElementById('cat-sort').value) || 0,
        isActive: document.getElementById('cat-active').checked
      };
      const url = editingCategoryId ? `${API}/api/categories/${editingCategoryId}` : `${API}/api/categories`;
      const method = editingCategoryId ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method, headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) { const d = await res.json(); alert(d.message || '儲存失敗'); return; }
      closeCategoryModal();
      await loadCategories();
    }

    async function deleteCategory(id) {
      if (!confirm('確定停用此分類？（不會真正刪除，可透過編輯重新啟用）')) return;
      const res = await fetch(`${API}/api/categories/${id}`, {
        method: 'DELETE', headers: { Authorization: `Bearer ${token}` }
      });
      const d = await res.json();
      if (!res.ok) { alert(d.message); return; }
      if (selectedCategoryId === id) selectedCategoryId = null;
      await loadCategories();
    }

    // ── Item Modal ─────────────────────────────────
    function openItemModal(item) {
      editingItemId = item?.id || null;
      currentImageBase64 = item?.imageBase64 || null;
      document.getElementById('item-modal-title').textContent = item ? '編輯菜品' : '新增菜品';
      document.getElementById('item-name').value = item?.name || '';
      document.getElementById('item-price').value = item?.price || '';
      document.getElementById('item-desc').value = item?.description || '';
      document.getElementById('item-sort').value = item?.sortOrder ?? 0;
      document.getElementById('item-available').checked = item ? item.isAvailable : true;
      document.getElementById('item-image-file').value = '';

      const preview = document.getElementById('item-image-preview');
      if (currentImageBase64) {
        document.getElementById('preview-img').src = currentImageBase64;
        preview.classList.remove('hidden');
      } else {
        preview.classList.add('hidden');
      }
      document.getElementById('item-modal').classList.remove('hidden');
    }
    function closeItemModal() { document.getElementById('item-modal').classList.add('hidden'); }

    async function editItem(id) {
      const res = await fetch(`${API}/api/menu/${id}`, { headers: { Authorization: `Bearer ${token}` } });
      const item = await res.json();
      openItemModal(item);
    }

    function previewImage(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      if (file.size > 2 * 1024 * 1024) { alert('圖片不超過 2MB'); input.value = ''; return; }
      const reader = new FileReader();
      reader.onload = e => {
        currentImageBase64 = e.target.result;
        document.getElementById('preview-img').src = currentImageBase64;
        document.getElementById('item-image-preview').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      currentImageBase64 = null;
      document.getElementById('item-image-file').value = '';
      document.getElementById('item-image-preview').classList.add('hidden');
    }

    async function saveItemModal() {
      const name = document.getElementById('item-name').value.trim();
      const price = parseFloat(document.getElementById('item-price').value);
      if (!name) { alert('請輸入菜品名稱'); return; }
      if (isNaN(price) || price < 0) { alert('請輸入正確價格'); return; }

      const body = {
        categoryId: selectedCategoryId,
        name,
        description: document.getElementById('item-desc').value.trim() || null,
        price,
        imageBase64: currentImageBase64,
        isAvailable: document.getElementById('item-available').checked,
        sortOrder: parseInt(document.getElementById('item-sort').value) || 0
      };

      const url = editingItemId ? `${API}/api/menu/${editingItemId}` : `${API}/api/menu`;
      const method = editingItemId ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method, headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) { const d = await res.json(); alert(d.message || '儲存失敗'); return; }
      closeItemModal();
      await loadItems();
      await loadCategories();
    }

    async function deleteItem(id) {
      if (!confirm('確定下架此菜品？（不會真正刪除，可透過編輯重新上架）')) return;
      const res = await fetch(`${API}/api/menu/${id}`, {
        method: 'DELETE', headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) { alert('操作失敗'); return; }
      await loadItems();
      await loadCategories();
    }

    async function toggleItem(id, current) {
      await fetch(`${API}/api/menu/${id}/toggle`, {
        method: 'PATCH', headers: { Authorization: `Bearer ${token}` }
      });
      await loadItems();
      await loadCategories();
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/admin/index.html';
    }

    loadCategories();
  </script>
</body>
</html>
