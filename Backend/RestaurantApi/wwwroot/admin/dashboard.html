<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>儀表板 - 餐飲管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-56 bg-gray-900 text-white flex flex-col min-h-screen fixed left-0 top-0 z-30">
    <div class="p-5 border-b border-gray-700">
      <div class="text-xl font-bold">🍽️ 餐飲管理</div>
      <div class="text-xs text-gray-400 mt-1" id="admin-name"></div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-orange-600 text-white text-sm font-medium">📊 儀表板</a>
      <a href="orders.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition">📋 訂單管理</a>
      <a href="menu.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition">🍜 菜單管理</a>
      <a href="reports.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition">📈 報表 & QR碼</a>
    </nav>
    <div class="p-3">
      <button onclick="logout()" class="w-full px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-400 text-sm text-left transition">登出</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="ml-56 flex-1 p-6">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800">儀表板</h1>
      <div class="text-sm text-gray-500" id="refresh-time"></div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <div class="text-sm text-gray-500 mb-1">今日營業額</div>
        <div class="text-2xl font-bold text-green-600" id="today-revenue">--</div>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <div class="text-sm text-gray-500 mb-1">今日訂單數</div>
        <div class="text-2xl font-bold text-blue-600" id="today-orders">--</div>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <div class="text-sm text-gray-500 mb-1">待確認訂單</div>
        <div class="text-2xl font-bold text-orange-600" id="pending-orders">--</div>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <div class="text-sm text-gray-500 mb-1">使用中桌位</div>
        <div class="text-2xl font-bold text-purple-600" id="active-tables">--</div>
      </div>
    </div>

    <!-- Recent Orders -->
    <div class="bg-white rounded-xl shadow-sm p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-gray-800">最新訂單</h2>
        <a href="orders.html" class="text-sm text-orange-500 hover:underline">查看全部</a>
      </div>
      <div id="recent-orders" class="space-y-2">
        <div class="text-center text-gray-400 py-8">載入中...</div>
      </div>
    </div>
  </main>

  <script>
    const API = '';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/admin/index.html';

    document.getElementById('admin-name').textContent = localStorage.getItem('username') || '';

    const statusColors = {
      Pending: 'bg-yellow-100 text-yellow-700',
      Confirmed: 'bg-blue-100 text-blue-700',
      Unpaid: 'bg-purple-100 text-purple-700',
      Paid: 'bg-green-100 text-green-700',
      Cancelled: 'bg-gray-100 text-gray-500'
    };

    async function load() {
      try {
        const res = await fetch(`${API}/api/dashboard`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();

        document.getElementById('today-revenue').textContent = `NT$ ${data.todayRevenue.toLocaleString()}`;
        document.getElementById('today-orders').textContent = data.todayOrderCount;
        document.getElementById('pending-orders').textContent = data.pendingOrderCount;
        document.getElementById('active-tables').textContent = data.activeTableCount;
        document.getElementById('refresh-time').textContent = `更新：${new Date().toLocaleTimeString('zh-TW')}`;

        const container = document.getElementById('recent-orders');
        if (!data.recentOrders.length) {
          container.innerHTML = '<div class="text-center text-gray-400 py-8">今日尚無訂單</div>';
          return;
        }
        container.innerHTML = data.recentOrders.map(o => `
          <div class="flex items-center justify-between py-2 px-3 rounded-lg hover:bg-gray-50 border border-gray-100">
            <div class="flex items-center gap-3">
              <span class="font-medium text-gray-700">#${o.id}</span>
              <span class="text-gray-600">${o.tableName}</span>
              <span class="text-sm text-gray-400">${o.itemCount} 項</span>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-sm font-medium text-gray-700">NT$ ${o.totalAmount}</span>
              <span class="text-xs px-2 py-0.5 rounded-full font-medium ${statusColors[o.status] || 'bg-gray-100 text-gray-500'}">${o.statusLabel}</span>
              <span class="text-xs text-gray-400">${new Date(o.createdAt).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })}</span>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error(e);
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/admin/index.html';
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
