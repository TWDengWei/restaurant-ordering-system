<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>儀表板 - 餐飲管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #sidebar { transition: transform 0.3s ease, width 0.3s ease; }
    #main-content { transition: margin-left 0.3s ease; }
    @media (max-width: 767px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main-content { margin-left: 0 !important; padding-top: 3.5rem; }
    }
    @media (min-width: 768px) {
      #sidebar.collapsed { width: 3.5rem; }
      #sidebar.collapsed .nav-label { display: none; }
      #sidebar.collapsed .nav-link { justify-content: center; padding-left: 0; padding-right: 0; }
      #main-content.collapsed-main { margin-left: 3.5rem !important; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <!-- Mobile Top Bar -->
  <div class="md:hidden fixed top-0 left-0 right-0 h-14 bg-gray-900 text-white flex items-center px-4 z-40 shadow-lg">
    <button onclick="openSidebar()" class="mr-3 p-1.5 rounded-lg hover:bg-gray-700 focus:outline-none">
      <div class="space-y-1.5">
        <div class="w-5 h-0.5 bg-white rounded"></div>
        <div class="w-5 h-0.5 bg-white rounded"></div>
        <div class="w-5 h-0.5 bg-white rounded"></div>
      </div>
    </button>
    <span class="text-lg font-bold">🍽️ 餐飲管理</span>
  </div>

  <!-- Sidebar Overlay (mobile) -->
  <div id="sidebar-overlay" onclick="closeSidebar()" class="hidden fixed inset-0 bg-black/50 z-20 md:hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="w-56 bg-gray-900 text-white flex flex-col min-h-screen fixed left-0 top-0 z-30">
    <div class="p-5 border-b border-gray-700">
      <div class="flex items-center gap-2">
        <span class="text-xl">🍽️</span>
        <span class="font-bold nav-label">餐飲管理</span>
      </div>
      <div class="text-xs text-gray-400 mt-1 nav-label" id="admin-name"></div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="dashboard.html" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg bg-orange-600 text-white text-sm font-medium"><span>📊</span><span class="nav-label">儀表板</span></a>
      <a href="orders.html"    class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition"><span>📋</span><span class="nav-label">訂單管理</span></a>
      <a href="menu.html"      class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition"><span>🍜</span><span class="nav-label">菜單管理</span></a>
      <a href="reports.html"   class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition"><span>📈</span><span class="nav-label">報表</span></a>
      <a href="qrcodes.html"   class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-300 text-sm transition"><span>🔲</span><span class="nav-label">QR碼管理</span></a>
    </nav>
    <div class="p-3 space-y-1">
      <button onclick="toggleCollapse()" id="collapse-btn" class="hidden md:flex w-full px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-400 text-sm items-center gap-2 transition">
        <span id="collapse-icon">◀</span><span class="nav-label">收縮選單</span>
      </button>
      <button onclick="logout()" class="nav-link w-full px-3 py-2 rounded-lg hover:bg-gray-700 text-gray-400 text-sm text-left flex items-center gap-2 transition">
        <span>🚪</span><span class="nav-label">登出</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main-content" class="ml-56 flex-1 p-4 md:p-6">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800">儀表板</h1>
      <div class="text-sm text-gray-500" id="refresh-time"></div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4 mb-6">
      <div class="bg-white rounded-xl p-4 md:p-5 shadow-sm">
        <div class="text-xs md:text-sm text-gray-500 mb-1">今日營業額</div>
        <div class="text-xl md:text-2xl font-bold text-green-600" id="today-revenue">--</div>
      </div>
      <div class="bg-white rounded-xl p-4 md:p-5 shadow-sm">
        <div class="text-xs md:text-sm text-gray-500 mb-1">今日訂單數</div>
        <div class="text-xl md:text-2xl font-bold text-blue-600" id="today-orders">--</div>
      </div>
      <div class="bg-white rounded-xl p-4 md:p-5 shadow-sm">
        <div class="text-xs md:text-sm text-gray-500 mb-1">待確認訂單</div>
        <div class="text-xl md:text-2xl font-bold text-orange-600" id="pending-orders">--</div>
      </div>
      <div class="bg-white rounded-xl p-4 md:p-5 shadow-sm">
        <div class="text-xs md:text-sm text-gray-500 mb-1">使用中桌位</div>
        <div class="text-xl md:text-2xl font-bold text-purple-600" id="active-tables">--</div>
      </div>
    </div>

    <!-- Recent Orders -->
    <div class="bg-white rounded-xl shadow-sm p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-gray-800">最新訂單</h2>
        <a href="orders.html" class="text-sm text-orange-500 hover:underline">查看全部</a>
      </div>
      <div id="recent-orders" class="space-y-2">
        <div class="text-center text-gray-400 py-8">載入中...</div>
      </div>
    </div>
  </main>

  <script>
    const API = '';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/admin/index.html';

    document.getElementById('admin-name').textContent = localStorage.getItem('username') || '';

    const statusColors = {
      Pending: 'bg-yellow-100 text-yellow-700',
      Confirmed: 'bg-blue-100 text-blue-700',
      Unpaid: 'bg-purple-100 text-purple-700',
      Paid: 'bg-green-100 text-green-700',
      Cancelled: 'bg-gray-100 text-gray-500'
    };

    async function load() {
      try {
        const res = await fetch(`${API}/api/dashboard`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();

        document.getElementById('today-revenue').textContent = `NT$ ${data.todayRevenue.toLocaleString()}`;
        document.getElementById('today-orders').textContent = data.todayOrderCount;
        document.getElementById('pending-orders').textContent = data.pendingOrderCount;
        document.getElementById('active-tables').textContent = data.activeTableCount;
        document.getElementById('refresh-time').textContent = `更新：${new Date().toLocaleTimeString('zh-TW')}`;

        const container = document.getElementById('recent-orders');
        if (!data.recentOrders.length) {
          container.innerHTML = '<div class="text-center text-gray-400 py-8">今日尚無訂單</div>';
          return;
        }
        container.innerHTML = data.recentOrders.map(o => `
          <div class="border border-gray-100 rounded-xl overflow-hidden">
            <div class="flex items-center justify-between px-3 py-2 cursor-pointer hover:bg-gray-50 transition"
              onclick="toggleDetail('db-${o.id}')">
              <div class="flex items-center gap-2 min-w-0">
                <span class="font-bold text-gray-800 flex-shrink-0">#${o.id}</span>
                <span class="text-gray-600 flex-shrink-0">${o.tableName}</span>
                <span class="text-xs text-gray-400 hidden sm:inline">${new Date(o.createdAt).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })}</span>
              </div>
              <div class="flex items-center gap-1.5 flex-shrink-0">
                <span class="font-semibold text-gray-800 text-sm">NT$ ${o.totalAmount}</span>
                <span class="text-xs px-2 py-0.5 rounded-full font-medium ${statusColors[o.status] || 'bg-gray-100 text-gray-500'}">${o.statusLabel}</span>
                <span id="icon-db-${o.id}" class="text-gray-400 text-xs">▼</span>
              </div>
            </div>
            <div id="detail-db-${o.id}" class="hidden border-t border-gray-100 px-3 py-2 bg-gray-50">
              <div class="text-xs text-gray-500 space-y-0.5 mb-2">
                ${(o.items || []).map(i => `
                  <div class="flex justify-between">
                    <span>${i.itemName} × ${i.quantity}${i.note ? ' <span class="text-orange-400">('+i.note+')</span>' : ''}</span>
                    <span>NT$ ${i.subtotal}</span>
                  </div>
                `).join('')}
                ${o.note ? `<div class="text-blue-400 mt-1">備註：${o.note}</div>` : ''}
              </div>
              <div class="flex gap-2">
                ${o.status === 'Pending' ? `
                  <button onclick="quickAction(${o.id},'confirm')" class="text-xs bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded-lg transition">確認訂單</button>
                ` : ''}
                ${(o.status === 'Confirmed' || o.status === 'Unpaid') ? `
                  <button onclick="quickAction(${o.id},'pay')" class="text-xs bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded-lg transition">結帳</button>
                ` : ''}
                ${['Pending','Confirmed','Unpaid'].includes(o.status) ? `
                  <button onclick="quickAction(${o.id},'cancel')" class="text-xs bg-red-100 hover:bg-red-200 text-red-600 px-3 py-1 rounded-lg transition">取消</button>
                ` : ''}
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error(e);
      }
    }

    function toggleDetail(key) {
      const el   = document.getElementById(`detail-${key}`);
      const icon = document.getElementById(`icon-${key}`);
      if (!el) return;
      const hidden = el.classList.toggle('hidden');
      icon.textContent = hidden ? '▼' : '▲';
    }

    async function quickAction(id, action) {
      if (action === 'pay' && !confirm('確認結帳？')) return;
      if (action === 'cancel' && !confirm('確定取消此訂單？')) return;
      try {
        const res = await fetch(`${API}/api/orders/${id}/${action}`, {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}` }
        });
        const d = await res.json();
        if (!res.ok) { alert(d.message || '操作失敗'); return; }
        load();
      } catch (e) {
        alert('網路錯誤，請重試');
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/admin/index.html';
    }

    // ── Sidebar RWD ────────────────────────────────
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebar-overlay').classList.remove('hidden');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.add('hidden');
    }
    function toggleCollapse() {
      const sidebar = document.getElementById('sidebar');
      const main    = document.getElementById('main-content');
      const icon    = document.getElementById('collapse-icon');
      const col     = sidebar.classList.toggle('collapsed');
      main.classList.toggle('collapsed-main', col);
      if (icon) icon.textContent = col ? '▶' : '◀';
      localStorage.setItem('sidebarCollapsed', col ? '1' : '0');
    }
    (function () {
      if (window.innerWidth >= 768 && localStorage.getItem('sidebarCollapsed') === '1') {
        const s = document.getElementById('sidebar');
        const m = document.getElementById('main-content');
        const i = document.getElementById('collapse-icon');
        if (s) s.classList.add('collapsed');
        if (m) m.classList.add('collapsed-main');
        if (i) i.textContent = '▶';
      }
    })();

    load();
    setInterval(load, 15000);
  </script>
</body>
</html>
