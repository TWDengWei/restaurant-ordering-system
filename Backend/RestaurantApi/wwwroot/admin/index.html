<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>餐飲管理系統 - 登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-orange-50 to-amber-100 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🍽️</div>
      <h1 class="text-2xl font-bold text-gray-800">餐飲管理系統</h1>
      <p class="text-gray-500 text-sm mt-1">請輸入管理員帳號</p>
    </div>

    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 mb-4 text-sm"></div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">帳號</label>
        <input id="username" type="text" required placeholder="請輸入帳號"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
        <input id="password" type="password" required placeholder="請輸入密碼"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
      </div>
      <button type="submit" id="submit-btn"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 rounded-lg transition">
        登入
      </button>
    </form>

    <p class="text-center text-xs text-gray-400 mt-6">預設帳號：admin / admin123</p>
  </div>

  <script>
    const API = '';

    // 已登入則跳轉
    if (localStorage.getItem('token')) {
      window.location.href = '/admin/dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = '登入中...';
      errEl.classList.add('hidden');

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '登入失敗');

        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '登入';
      }
    });
  </script>
</body>
</html>
